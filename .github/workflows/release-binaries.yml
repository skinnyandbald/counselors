name: Release Binaries

on:
  workflow_call:
    inputs:
      tag:
        description: 'Tag to build binaries for (e.g., v1.2.3)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build binaries for (e.g., v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    steps:
      - name: Normalize and validate tag
        id: tag
        run: |
          TAG="${{ inputs.tag }}"
          TAG="${TAG#refs/tags/}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Invalid tag format '$TAG'. Expected vX.Y.Z"
            exit 1
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.tag.outputs.value }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binaries
        run: bun run scripts/build-binaries.ts

      - name: Generate checksums
        run: |
          cd dist
          for f in counselors-darwin-arm64 counselors-darwin-x64 counselors-linux-x64 counselors-linux-arm64; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: |
            dist/counselors-darwin-arm64
            dist/counselors-darwin-x64
            dist/counselors-linux-x64
            dist/counselors-linux-arm64
            dist/counselors-darwin-arm64.sha256
            dist/counselors-darwin-x64.sha256
            dist/counselors-linux-x64.sha256
            dist/counselors-linux-arm64.sha256
